apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-operator
  labels:
    app.kubernetes.io/name: agent-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-operator
subjects:
  - kind: ServiceAccount
    name: agent-operator
    namespace: {{ .Values.namespace }}

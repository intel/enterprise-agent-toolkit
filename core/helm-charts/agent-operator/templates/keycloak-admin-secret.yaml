{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keycloak.adminSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: agent-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  username: {{ .Values.keycloak.adminUser | quote }}
  password: {{ .Values.keycloak.adminPassword | quote }}
{{- end }}

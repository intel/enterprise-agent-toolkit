{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.gateway.tokenSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  token: {{ .Values.gateway.token | quote }}
{{- end }}

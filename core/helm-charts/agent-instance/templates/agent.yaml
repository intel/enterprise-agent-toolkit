apiVersion: intel-stack.io/v1alpha1
kind: Agent
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  owner:
    principal: {{ required "owner is required (--set owner=user@intel.com)" .Values.owner | quote }}
  skills:
    {{- toYaml .Values.skills | nindent 4 }}
